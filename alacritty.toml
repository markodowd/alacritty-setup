[window]
startup_mode = "Fullscreen"
decorations = "None"
dynamic_title = true

[font]
size = 16

  [font.normal]
  family = "JetBrainsMono Nerd Font"
  style = "Regular"

  [font.bold]
  family = "JetBrainsMono Nerd Font"
  style = "Bold"

  [font.italic]
  family = "JetBrainsMono Nerd Font"
  style = "Italic"

  [font.bold_italic]
  family = "JetBrainsMono Nerd Font"
  style = "Bold Italic"

  [font.offset]
  x = 0
  y = 1

[cursor]
blink_interval = 600
blink_timeout = 0

  [cursor.style]
  shape = "Block"
  blinking = "Always"

[mouse]
hide_when_typing = true

[general]
import = [
  "~/.config/alacritty/themes/bearded-theme-arc-blueberry.toml"
]

